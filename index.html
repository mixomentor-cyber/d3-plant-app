<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3-Plant Shift Reporting App</title>
    
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            try {
                if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
                    navigator.serviceWorker.register('sw.js').catch(function(err) {
                        console.warn('ServiceWorker registration failed: ', err);
                    });
                } else {
                    console.warn('ServiceWorker not registered: Unsupported protocol ', window.location.protocol);
                }
            } catch (err) {
                console.warn('ServiceWorker registration failed with exception: ', err);
            }
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                        'spin-slow': 'spin 1.5s linear infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body, html { overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active,
        select:-webkit-autofill,
        select:-webkit-autofill:hover,
        select:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 30px rgba(255,255,255,0.1) inset !important;
            -webkit-text-fill-color: inherit !important;
            transition: background-color 5000s ease-in-out 0s;
        }
        
        .dashboard-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
            border-color: #6366f1;
        }
    </style>
</head>
<body class="font-sans antialiased relative min-h-screen">

        <i class="fa-solid fa-circle-exclamation flex-shrink-0"></i>
        <span id="error-toast-msg" class="text-sm font-medium break-words">An error occurred.</span>
    </div>

    <div id="success-toast" class="fixed top-8 left-1/2 transform -translate-x-1/2 bg-emerald-500/90 text-white px-6 py-3 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.12)] backdrop-blur-md border border-emerald-400 hidden items-center space-x-3 z-[100] transition-opacity duration-300 w-[90%] sm:w-auto max-w-md">
        <i class="fa-solid fa-circle-check flex-shrink-0"></i>
        <span id="success-toast-msg" class="text-sm font-medium break-words">Action successful!</span>

    <div id="bg-dashboard" class="fixed inset-0 z-[-1] bg-slate-50 transition-opacity duration-1000 opacity-0"></div>

                                <option value="" disabled selected>Loading users...</option>

                    <div class="space-y-2">

                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fa-solid fa-check-double text-white/60"></i>
                            </div>
                            <input type="password" id="cp-confirm-password" class="w-full bg-white/10 border border-white/20 text-white placeholder-white/50 text-sm rounded-xl block p-3.5 pl-11 focus:outline-none focus:ring-2 focus:ring-white/50 transition-all backdrop-blur-sm hover:bg-white/20" placeholder="••••••••">

                    <div class="text-center mt-2">
                        <button type="button" id="back-to-login-btn" class="text-sm font-medium text-white/80 hover:text-white transition-colors"><i class="fa-solid fa-arrow-left mr-1"></i> Back to Login</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
